<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>2048</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#faf8ef;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex;justify-content:center;align-items:center;
  -webkit-tap-highlight-color:transparent;user-select:none
}
.container{width:100%;max-width:520px;padding:16px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.title{font-size:2.2rem;font-weight:800;color:#776e65}
.scores{display:flex;gap:8px}
.score-box{
  background:#bbada0;color:#fff;border-radius:6px;padding:6px 18px;
  text-align:center;min-width:80px
}
.score-box .label{font-size:.65rem;text-transform:uppercase;opacity:.8}
.score-box .value{font-size:1.3rem;font-weight:700}
.sub-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;font-size:.85rem;color:#776e65
}
.btn{
  background:#8f7a66;color:#f9f6f2;border:none;border-radius:6px;
  padding:8px 18px;font-size:.85rem;font-weight:700;cursor:pointer;
  transition:background .15s
}
.btn:hover{background:#9f8b77}
.btn:active{transform:scale(.96)}
.grid-container{
  position:relative;background:#bbada0;border-radius:8px;
  padding:8px;aspect-ratio:1/1;width:100%;
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px
}
.cell{
  background:rgba(238,228,218,.35);border-radius:6px;
  aspect-ratio:1/1
}
.tile-container{
  position:absolute;inset:8px;pointer-events:none;z-index:2
}
.tile{
  position:absolute;border-radius:6px;
  display:flex;justify-content:center;align-items:center;
  font-weight:800;transition:transform .12s ease,opacity .12s ease;
  will-change:transform,opacity
}
.tile-2{background:#eee4da;color:#776e65}
.tile-4{background:#ede0c8;color:#776e65}
.tile-8{background:#f2b179;color:#f9f6f2}
.tile-16{background:#f59563;color:#f9f6f2}
.tile-32{background:#f67c5f;color:#f9f6f2}
.tile-64{background:#f65e3b;color:#f9f6f2}
.tile-128{background:#edcf72;color:#f9f6f2;font-size:2rem}
.tile-256{background:#edcc61;color:#f9f6f2;font-size:2rem}
.tile-512{background:#edc850;color:#f9f6f2;font-size:2rem}
.tile-1024{background:#edc53f;color:#f9f6f2;font-size:1.5rem}
.tile-2048{background:#edc22e;color:#f9f6f2;font-size:1.5rem}
.tile-super{background:#3c3a32;color:#f9f6f2;font-size:1.2rem}
.tile-new{animation:appear .2s ease}
.tile-merged{animation:pop .2s ease}
@keyframes appear{
  0%{opacity:0;transform:scale(0)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes pop{
  0%{transform:scale(1)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}
.overlay{
  position:absolute;inset:0;border-radius:8px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(238,228,218,.73);z-index:10;
  animation:fadeIn .6s ease
}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
.overlay h2{font-size:2.4rem;font-weight:800;color:#776e65;margin-bottom:8px}
.overlay p{font-size:1rem;color:#776e65;margin-bottom:16px}
.overlay .btn{font-size:1rem;padding:10px 28px}
@media(max-width:500px){
  .title{font-size:1.6rem}
  .score-box{min-width:64px;padding:4px 12px}
  .score-box .value{font-size:1.1rem}
  .grid-container{padding:6px;gap:6px}
  .tile-container{inset:6px}
  .overlay h2{font-size:1.8rem}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">最高</div><div class="value" id="best">0</div></div>
    </div>
  </div>
  <div class="sub-header">
    <span>合并相同数字，得到 <strong>2048</strong>！</span>
    <button class="btn" id="newGameBtn">新游戏</button>
  </div>
  <div class="grid-container" id="grid">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="tile-container" id="tileContainer"></div>
  </div>
</div>
<script>
(()=>{
const SIZE=4;
let grid,score,best,container,tileContainer,scoreEl,bestEl;
let touchStartX,touchStartY;
let tilePool=[];

function init(){
  container=document.getElementById('grid');
  tileContainer=document.getElementById('tileContainer');
  scoreEl=document.getElementById('score');
  bestEl=document.getElementById('best');
  best=+localStorage.getItem('best2048')||0;
  bestEl.textContent=best;
  document.getElementById('newGameBtn').addEventListener('click',reset);
  document.addEventListener('keydown',onKey);
  if('ontouchstart'in window){
    container.addEventListener('touchstart',onTouchStart,{passive:true});
    container.addEventListener('touchend',onTouchEnd,{passive:true});
  }
  reset();
}

function reset(){
  const ov=container.querySelector('.overlay');
  if(ov)ov.remove();
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0;scoreEl.textContent='0';
  addRandomTile();addRandomTile();
  renderTiles();
}

function getTile(){
  return tilePool.pop()||document.createElement('div');
}

function addRandomTile(){
  const empty=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!grid[r][c])empty.push([r,c]);
  if(!empty.length)return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<.9?2:4;
}

function renderTiles(animType){
  const pad=container.querySelectorAll('.cell');
  if(!pad.length)return;
  const gap=parseFloat(getComputedStyle(container).gap)||8;
  const containerRect=container.getBoundingClientRect();
  const tileSize=(containerRect.width-(SIZE+1)*gap)/SIZE;
  tileContainer.innerHTML='';
  tilePool=[];
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      const val=grid[r][c];
      if(!val)continue;
      const el=getTile();
      el.className='tile tile-'+ (val>2048?'super':val);
      el.textContent=val;
      const x=c*(tileSize+gap),y=r*(tileSize+gap);
      el.style.width=tileSize+'px';el.style.height=tileSize+'px';
      el.style.fontSize=val>=1000?'1.5rem':val>=100?'1.8rem':'2.2rem';
      el.style.transform='translate3d('+x+'px,'+y+'px,0)';
      if(animType==='new')el.classList.add('tile-new');
      else if(animType==='merged')el.classList.add('tile-merged');
      tileContainer.appendChild(el);
    }
  }
}

function slideLine(line){
  let arr=line.filter(v=>v!==0);
  let merged=0;
  for(let i=0;i<arr.length-1;i++){
    if(arr[i]!==0&&arr[i]===arr[i+1]){
      arr[i]*=2;merged+=arr[i];arr.splice(i+1,1);i--;
    }
  }
  while(arr.length<SIZE)arr.push(0);
  return {line:arr,merged};
}

function move(dx,dy){
  let moved=false,totalMerge=0;
  const range=Array.from({length:SIZE},(_,i)=>i);
  const outer=dx!==0?range:[...range].reverse();
  const inner=dy!==0?range:[...range].reverse();
  for(const i of outer){
    const line=[];
    for(const j of inner){
      const r=dx!==0?i:j, c=dx!==0?j:i;
      line.push(grid[r][c]);
    }
    const res=slideLine(line);
    if(res.merged||res.line.some((v,idx)=>v!==line[idx])){
      moved=true;totalMerge+=res.merged;
    }
    for(let idx=0;idx<SIZE;idx++){
      const r=dx!==0?i:inner[idx], c=dx!==0?inner[idx]:i;
      grid[r][c]=res.line[idx];
    }
  }
  if(!moved)return false;
  score+=totalMerge;
  scoreEl.textContent=score;
  if(score>best){best=score;bestEl.textContent=best;localStorage.setItem('best2048',best);}
  addRandomTile();
  renderTiles('new');
  checkGameOver();
  return true;
}

function canMerge(){
  for(let r=0;r<SIZE;r++)
    for(let c=0;c<SIZE;c++){
      const v=grid[r][c];
      if(!v)return true;
      if(c+1<SIZE&&grid[r][c+1]===v)return true;
      if(r+1<SIZE&&grid[r+1][c]===v)return true;
    }
  return false;
}

function checkGameOver(){
  for(let r=0;r<SIZE;r++)
    for(let c=0;c<SIZE;c++)
      if(grid[r][c]===2048){showOverlay('你赢了！','','继续游戏');return;}
  if(!canMerge()){
    showOverlay('游戏结束！','得分：'+score,'再来一局');
  }
}

function showOverlay(title,sub,btn){
  const ov=container.querySelector('.overlay');
  if(ov)ov.remove();
  const el=document.createElement('div');
  el.className='overlay';
  let html='<h2>'+title+'</h2>';
  if(sub)html+='<p>'+sub+'</p>';
  html+='<button class="btn" id="overlayBtn">'+btn+'</button>';
  el.innerHTML=html;
  container.appendChild(el);
  el.querySelector('#overlayBtn').addEventListener('click',()=>{el.remove();reset();});
}

function onKey(e){
  const keyMap={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  const d=keyMap[e.key];
  if(d){e.preventDefault();move(d[0],d[1]);}
}

function onTouchStart(e){
  const t=e.touches[0];
  touchStartX=t.clientX;touchStartY=t.clientY;
}

function onTouchEnd(e){
  if(touchStartX==null)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  const absX=Math.abs(dx),absY=Math.abs(dy);
  if(Math.max(absX,absY)<30)return;
  if(absX>absY)move(dx>0?1:-1,0);
  else move(0,dy>0?1:-1);
  touchStartX=touchStartY=null;
}

init();
})();
</script>
</body>
</html>
